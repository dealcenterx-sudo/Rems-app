name: Auto-merge Claude branch to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: false

      - name: Set git identity
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude-bot@dealtech.ai"

      # Only reached if lint, tests, and build all passed
      - name: Merge claude branch into main
        run: |
          git checkout main
          git merge --no-ff ${{ github.ref_name }} -m "Auto-merge ${{ github.ref_name }} into main"
          git push origin main
