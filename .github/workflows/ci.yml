name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Check constants
        run: npm run check:constants

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci
        env:
          CI: true

      - name: API tests
        run: npm run test:api

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Build
        run: npm run build
        env:
          # CRA promotes warnings to errors when CI=true; keep parity with local builds
          CI: false
